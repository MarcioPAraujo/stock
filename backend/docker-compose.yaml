services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: supermarket
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "4321:5432"
    volumes:
      - supermarket_db_data:/var/lib/postgresql/data
  
  app:
    image: supermarket-stock:latest
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
volumes:
  supermarket_db_data:
